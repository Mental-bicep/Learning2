spring.application.name=Irctc-booking

server.port=8080

# MySQL Database Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/kodewala
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:kodewala}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


management.endpoints.web.exposure.include=* 
#management.endpoints.web.exposure.include=health,metrics